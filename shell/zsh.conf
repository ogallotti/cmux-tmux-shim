# cmux-tmux-shim: Add to ~/.zshrc

# Fake TMUX env so Claude Code uses split-pane mode for agent teams
# Unique per surface to avoid conflicts between panes
if [[ -n "$CMUX_WORKSPACE_ID" ]]; then
    export TMUX="/tmp/cmux-shim,$$,${CMUX_SURFACE_ID:0:8}"
    export TMUX_PANE="%0"
fi

# Auto-launch claude in new cmux tabs (skip teammate split panes)
if [[ -n "$CMUX_WORKSPACE_ID" ]] && [[ -o interactive ]] && [[ -z "$CMUX_NO_CLAUDE" ]]; then
    _pane_count=$(cmux list-panes 2>/dev/null | wc -l | tr -d ' ')
    if [[ "$_pane_count" -le 1 ]]; then
        claude --dangerously-skip-permissions
    fi
    unset _pane_count
fi
