# cmux-tmux-shim: Add to ~/.config/fish/config.fish

# Fake TMUX env so Claude Code uses split-pane mode for agent teams
# Unique per surface to avoid conflicts between panes
if set -q CMUX_WORKSPACE_ID
    set -l surface_short (string sub -l 8 -- "$CMUX_SURFACE_ID" 2>/dev/null; or echo "0")
    set -gx TMUX "/tmp/cmux-shim,$fish_pid,$surface_short"
    set -gx TMUX_PANE "%0"
end

# Auto-launch claude in new cmux tabs (skip teammate split panes)
if set -q CMUX_WORKSPACE_ID; and status is-interactive; and not set -q CMUX_NO_CLAUDE
    set -l pane_count (cmux list-panes 2>/dev/null | count)
    if test "$pane_count" -le 1
        claude --dangerously-skip-permissions
    end
end
